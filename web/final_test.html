<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #0a1129;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 顶部标题栏 */
        .top-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(16, 25, 48, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }

        .company-name {
            font-size: 20px;
            font-weight: bold;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .top-actions {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            padding: 8px 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 6px;
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* 地图容器 */
        .map-container {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background: #0a1129;
        }

        #industryMap {
            width: 100%;
            height: 100%;
        }

        /* 悬浮面板通用样式 */
        .floating-panel {
            position: absolute;
            background: rgba(16, 25, 48, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 100;
            transition: all 0.3s ease;
        }

        .floating-panel:hover {
            box-shadow: 0 6px 30px rgba(0, 242, 254, 0.2);
            transform: translateY(-2px);
        }

        .panel-title {
            color: #00f2fe;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 左上角面板：企业核心状态 */
        .status-panel {
            top: 20px;
            left: 20px;
            width: 280px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.1);
        }

        .status-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .status-label {
            color: #b0b3c1;
            font-size: 14px;
        }

        .status-value {
            color: #00f2fe;
            font-weight: bold;
            font-size: 14px;
        }

        .pulse-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="company-info">
            <h1 class="company-name">鄄城YYY发制品集团</h1>
        </div>
        <div class="top-actions">
            <button class="action-btn" onclick="refreshData()">刷新数据</button>
            <button class="action-btn" onclick="toggleFullscreen()">全屏</button>
        </div>
    </header>

    <!-- 地图容器 -->
    <div class="map-container">
        <div id="industryMap"></div>
    </div>

    <!-- 左上角面板：企业核心状态 -->
    <div class="floating-panel status-panel">
        <h3 class="panel-title"><i class="fas fa-bolt"></i> 企业核心状态</h3>
        <div class="status-item">
            <span class="status-label">在线设备数</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span class="status-value">24/28</span>
                <div class="pulse-indicator"></div>
            </div>
        </div>
        <div class="status-item">
            <span class="status-label">当前生产线负荷</span>
            <span class="status-value">85%</span>
        </div>
        <div class="status-item">
            <span class="status-label">核心人才留存率</span>
            <span class="status-value">85.3%</span>
        </div>
        <div class="status-item">
            <span class="status-label">现金流健康指数</span>
            <span class="status-value">优良</span>
        </div>
    </div>

    <script>
        let industryMapChart;

        // 刷新数据
        function refreshData() {
            alert('数据刷新中...');
            setTimeout(() => {
                alert('数据刷新完成');
            }, 1000);
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 初始化产业地图
        function initIndustryMap() {
            console.log('Initializing map...');
            const mapElement = document.getElementById('industryMap');
            console.log('Map element:', mapElement);
            console.log('Map element dimensions:', mapElement.offsetWidth, 'x', mapElement.offsetHeight);
            
            if (!mapElement) {
                console.error('Map element not found!');
                return;
            }
            
            industryMapChart = echarts.init(mapElement);
            console.log('ECharts instance created:', industryMapChart);
            
            const option = {
                backgroundColor: '#0a1129',
                title: {
                    text: '产业地图',
                    left: 'center',
                    textStyle: {
                        color: '#00f2fe',
                        fontSize: 16
                    }
                },
                xAxis: {
                    type: 'value',
                    min: -180,
                    max: 180,
                    show: false
                },
                yAxis: {
                    type: 'value',
                    min: -90,
                    max: 90,
                    show: false
                },
                grid: {
                    left: '0%',
                    right: '0%',
                    top: '0%',
                    bottom: '0%'
                },
                series: [
                    {
                        type: 'scatter',
                        coordinateSystem: 'cartesian2d',
                        data: [
                            { name: '鄄城YYY集团', value: [0, 0], symbolSize: 25, itemStyle: { color: '#ff2d75' } },
                            { name: '美国', value: [-100, 40], symbolSize: 15, itemStyle: { color: '#ffa726' } },
                            { name: '欧洲', value: [10, 50], symbolSize: 15, itemStyle: { color: '#ffa726' } },
                            { name: '印度', value: [75, 20], symbolSize: 15, itemStyle: { color: '#00f2fe' } },
                            { name: '非洲', value: [20, 0], symbolSize: 15, itemStyle: { color: '#ffa726' } }
                        ],
                        label: {
                            show: true,
                            formatter: '{b}',
                            position: 'right',
                            color: '#ffffff',
                            fontSize: 12
                        }
                    },
                    {
                        type: 'lines',
                        coordinateSystem: 'cartesian2d',
                        effect: {
                            show: true,
                            period: 6,
                            trailLength: 0.7,
                            color: '#00f2fe',
                            symbolSize: 6
                        },
                        lineStyle: {
                            width: 2,
                            opacity: 0.6,
                            curveness: 0.2,
                            color: '#00f2fe'
                        },
                        data: [
                            { coords: [[0, 0], [-100, 40]] },
                            { coords: [[0, 0], [10, 50]] },
                            { coords: [[0, 0], [75, 20]] },
                            { coords: [[0, 0], [20, 0]] }
                        ]
                    }
                ]
            };
            
            industryMapChart.setOption(option);
            console.log('Map option set successfully');
        }

        // 页面加载完成后初始化所有图表
        window.addEventListener('load', function() {
            console.log('Window loaded, initializing charts');
            initIndustryMap();
        });

        // 窗口大小变化时调整图表大小
        window.addEventListener('resize', function() {
            if (industryMapChart) industryMapChart.resize();
        });
    </script>
</body>
</html>
