<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产业透视 - 鄄城县发制品产业大脑</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
  <style>
    .nav-link { position: relative; transition: all 0.3s ease; }
    .nav-link:hover { color: #c9a227; }
    .nav-link::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #1a5fb4, #c9a227); transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
    .nav-link.active { color: #c9a227; }
    .nav-link.active::after { width: 100%; }
    .nav-scrolled { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2); }
    .map-container { background: #1a1a2e; border-radius: 16px; padding: 20px; border: 1px solid #3a3a5e; min-height: 400px; }
    .node-card { background: linear-gradient(135deg, rgba(26, 95, 180, 0.1) 0%, rgba(26, 95, 180, 0.05) 100%); border: 1px solid rgba(26, 95, 180, 0.3); border-radius: 12px; padding: 16px; transition: all 0.3s ease; cursor: pointer; }
    .node-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(26, 95, 180, 0.2); border-color: rgba(26, 95, 180, 0.5); }
  </style>
</head>
<body style="overflow-y: auto; background: #0f172a;">
  <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-4" id="main-nav">
    <div class="max-w-[1600px] mx-auto px-8 flex items-center justify-between">
      <div class="flex items-center">
        <a href="../index.html" class="flex items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-600 to-yellow-500 flex items-center justify-center">
            <i class="fas fa-brain text-white text-xl"></i>
          </div>
          <div>
            <div class="text-white font-bold text-lg">鄄城县发制品产业大脑</div>
            <div class="text-xs text-gray-400">Industry Brain Platform</div>
          </div>
        </a>
      </div>
      <div class="hidden md:flex items-center gap-8">
        <a href="../index.html" class="nav-link text-gray-300 hover:text-white">首页</a>
        <a href="cockpit.html" class="nav-link text-gray-300 hover:text-white">产业全景</a>
        <a href="industry-map.html" class="nav-link active text-white">产业透视</a>
        <a href="monitor.html" class="nav-link text-gray-300 hover:text-white">安全防控</a>
        <a href="enterprise.html" class="nav-link text-gray-300 hover:text-white">企业画像</a>
        <a href="supply.html" class="nav-link text-gray-300 hover:text-white">资源枢纽</a>
        <a href="market.html" class="nav-link text-gray-300 hover:text-white">市场洞察</a>
        <a href="government.html" class="nav-link text-gray-300 hover:text-white">政务服务</a>
        <a href="shop.html" class="nav-link text-gray-300 hover:text-white">发品交易</a>
        <a href="hr.html" class="nav-link text-gray-300 hover:text-white">人力资源</a>
        <a href="finance.html" class="nav-link text-gray-300 hover:text-white">金融服务</a>
        <a href="thinktank.html" class="nav-link text-gray-300 hover:text-white">发业智库</a>
        <a href="traceability.html" class="nav-link text-gray-300 hover:text-white">发品溯源</a>
      </div>
      <div class="flex items-center gap-4">
        <a href="../admin/index.html" class="hidden md:flex items-center gap-2 text-gray-300 hover:text-white">
          <i class="fas fa-cog"></i><span>后台管理</span>
        </a>
        <a href="../index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i><span>退出系统</span></a>
      </div>
    </div>
  </nav>

  <div class="max-w-[1600px] mx-auto pt-24 px-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px; color: #fff;">发制品行业图谱</h1>
        <p style="color: #94a3b8; font-size: 14px;">全景展示发制品产业生态链与企业关系</p>
      </div>
      <div class="flex gap-3">
        <button class="btn btn-outline"><i class="fas fa-expand"></i> 全屏查看</button>
        <button class="btn btn-primary"><i class="fas fa-download"></i> 导出图谱</button>
      </div>
    </div>

    <div class="card mb-6" style="background: #1e293b; border: 1px solid #334155;">
      <div class="card-header" style="border-bottom: 1px solid #334155; padding: 16px 20px;">
        <div class="card-title" style="color: #fff;"><i class="fas fa-project-diagram"></i> 产业链图谱</div>
        <div class="flex gap-2">
          <button class="btn btn-outline filter-btn" data-filter="all" style="padding: 6px 12px; font-size: 12px;">全景</button>
          <button class="btn btn-outline filter-btn" data-filter="上游" style="padding: 6px 12px; font-size: 12px;">上游</button>
          <button class="btn btn-outline filter-btn" data-filter="中游" style="padding: 6px 12px; font-size: 12px;">中游</button>
          <button class="btn btn-outline filter-btn" data-filter="下游" style="padding: 6px 12px; font-size: 12px;">下游</button>
        </div>
      </div>
      <div class="map-container">
        <div id="industryChainChart" style="width: 100%; height: 600px;"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('scroll', function() {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 10) nav.classList.add('nav-scrolled');
      else nav.classList.remove('nav-scrolled');
    });

    document.addEventListener('DOMContentLoaded', function() {
      initIndustryChainChart();
    });

    function initIndustryChainChart() {
      const chartDom = document.getElementById('industryChainChart');
      const myChart = echarts.init(chartDom);

      // 数据定义
      const data = [
        { name: '山东鄄城', value: 100, coord: [115.5, 35.57], category: '核心枢纽' },
        { name: '印度', value: 40, coord: [78.96, 20.59], category: '上游原料' },
        { name: '东南亚', value: 30, coord: [110.0, 13.0], category: '上游原料' },
        { name: '河南许昌', value: 50, coord: [113.85, 34.04], category: '上游原料' },
        { name: '江浙地区', value: 35, coord: [120.2, 30.3], category: '上游辅料' },
        { name: '山东青岛', value: 45, coord: [120.38, 36.07], category: '中游生产' },
        { name: '美国', value: 70, coord: [-95.71, 37.09], category: '下游市场' },
        { name: '欧洲', value: 40, coord: [10.0, 50.0], category: '下游市场' },
        { name: '非洲', value: 50, coord: [20.0, 5.0], category: '下游市场' },
        { name: '日韩', value: 30, coord: [135.0, 35.0], category: '下游市场' }
      ];

      const flows = [
        { from: '印度', to: '山东鄄城', value: 40 },
        { from: '东南亚', to: '山东鄄城', value: 30 },
        { from: '河南许昌', to: '山东鄄城', value: 50 },
        { from: '江浙地区', to: '山东鄄城', value: 35 },
        { from: '山东鄄城', to: '美国', value: 70 },
        { from: '山东鄄城', to: '欧洲', value: 40 },
        { from: '山东鄄城', to: '非洲', value: 50 },
        { from: '山东鄄城', to: '日韩', value: 30 },
        { from: '山东鄄城', to: '山东青岛', value: 20 },
        { from: '山东青岛', to: '山东鄄城', value: 15 }
      ];

      // 颜色配置
      const colors = {
        '核心枢纽': '#FF0000',
        '上游原料': '#9a60b4',
        '上游辅料': '#5470c6',
        '中游生产': '#91cc75',
        '下游市场': '#ee6666'
      };

      // 构建节点数据
      const nodesData = data.map(item => ({
        name: item.name,
        value: item.coord.concat(item.value),
        category: item.category,
        symbolSize: item.category === '核心枢纽' ? 50 : 20 + item.value * 0.3,
        itemStyle: {
          color: colors[item.category],
          shadowBlur: item.category === '核心枢纽' ? 20 : 10,
          shadowColor: colors[item.category]
        },
        label: {
          show: true,
          position: 'right',
          formatter: '{b}',
          color: '#fff',
          fontSize: 12,
          fontWeight: item.category === '核心枢纽' ? 'bold' : 'normal'
        }
      }));

      // 构建飞线数据
      const linesData = flows.map(flow => {
        const fromNode = data.find(d => d.name === flow.from);
        const toNode = data.find(d => d.name === flow.to);
        const isUpstream = fromNode.category.includes('上游');
        const isDownstream = toNode.category.includes('下游');
        let color = '#91cc75';
        if (isUpstream) color = '#9a60b4';
        if (isDownstream) color = '#ee6666';
        
        return {
          coords: [fromNode.coord, toNode.coord],
          lineStyle: {
            color: color,
            width: 2 + flow.value / 20,
            opacity: 0.8,
            curveness: 0.2
          }
        };
      });

      // 类别配置
      const categories = [
        { name: '核心枢纽', itemStyle: { color: '#FF0000' } },
        { name: '上游原料', itemStyle: { color: '#9a60b4' } },
        { name: '上游辅料', itemStyle: { color: '#5470c6' } },
        { name: '中游生产', itemStyle: { color: '#91cc75' } },
        { name: '下游市场', itemStyle: { color: '#ee6666' } }
      ];

      const option = {
        backgroundColor: '#1a1a2e',
        title: {
          text: '发制品全球产业链枢纽：山东鄄城',
          left: 'center',
          top: 10,
          textStyle: { color: '#fff', fontSize: 18, fontWeight: 'bold' }
        },
        tooltip: {
          trigger: 'item',
          formatter: function(params) {
            if (params.seriesType === 'effectScatter') {
              return `<div style="font-weight:bold;color:#fff;">${params.name}</div><div style="color:#ccc;font-size:12px;">${params.data.category}</div>`;
            } else if (params.seriesType === 'lines') {
              return `<div style="font-weight:bold;color:#fff;">流量: ${params.data.value || 'N/A'}</div>`;
            }
          },
          backgroundColor: 'rgba(0,0,0,0.8)',
          borderColor: '#3a3a5e',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        legend: {
          orient: 'vertical',
          left: 20,
          top: 60,
          data: categories.map(c => c.name),
          textStyle: { color: '#fff' },
          selectedMode: 'multiple'
        },
        geo: {
          map: 'china',
          roam: true,
          zoom: 1.2,
          center: [105, 35],
          label: { show: true, color: '#fff', fontSize: 10 },
          itemStyle: {
            areaColor: '#1c1c3e',
            borderColor: '#3a3a5e',
            borderWidth: 1
          },
          emphasis: {
            itemStyle: { areaColor: '#2a2a4e' },
            label: { color: '#fff' }
          }
        },
        series: [
          {
            name: '产业链节点',
            type: 'effectScatter',
            coordinateSystem: 'geo',
            data: nodesData,
            categories: categories,
            symbolSize: function(val) { return val[2] / 2; },
            showEffectOn: 'render',
            rippleEffect: {
              brushType: 'stroke',
              scale: 3,
              period: 4
            },
            emphasis: {
              scale: true,
              itemStyle: {
                shadowBlur: 20,
                shadowColor: 'rgba(255,255,255,0.5)'
              }
            }
          },
          {
            name: '产业链流向',
            type: 'lines',
            coordinateSystem: 'geo',
            zlevel: 1,
            effect: {
              show: true,
              period: 4,
              trailLength: 0.4,
              symbol: 'arrow',
              symbolSize: 8,
              color: '#fff'
            },
            lineStyle: {
              curveness: 0.2
            },
            data: linesData,
            emphasis: {
              lineStyle: { width: 4, opacity: 1 }
            }
          }
        ]
      };

      myChart.setOption(option);

      // 筛选功能
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const filter = this.dataset.filter;
          let selected = {};
          
          if (filter === 'all') {
            categories.forEach(c => selected[c.name] = true);
          } else if (filter === '上游') {
            selected = { '核心枢纽': true, '上游原料': true, '上游辅料': true };
          } else if (filter === '中游') {
            selected = { '核心枢纽': true, '中游生产': true };
          } else if (filter === '下游') {
            selected = { '核心枢纽': true, '下游市场': true };
          }
          
          myChart.setOption({ legend: { selected: selected } });
          
          filterBtns.forEach(b => b.classList.remove('btn-primary'));
          this.classList.add('btn-primary');
        });
      });

      window.addEventListener('resize', () => myChart.resize());
    }
  </script>
</body>
</html>
