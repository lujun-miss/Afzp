<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产业透视 - 鄄城县发制品产业大脑</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
  <style>
    .nav-link { position: relative; transition: all 0.3s ease; }
    .nav-link:hover { color: #c9a227; }
    .nav-link::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #1a5fb4, #c9a227); transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
    .nav-link.active { color: #c9a227; }
    .nav-link.active::after { width: 100%; }
    .nav-scrolled { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2); }
    .map-container { background: #1a1a2e; border-radius: 16px; padding: 20px; border: 1px solid #3a3a5e; }
    .filter-btn { transition: all 0.3s ease; }
    .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    #company-info-panel {
      margin-top: 20px;
      padding: 20px;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #3a3a5e;
      border-radius: 12px;
      display: none;
    }
    #company-info-panel.show { display: block; animation: slideDown 0.3s ease; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .company-item {
      padding: 10px 15px;
      margin: 8px 0;
      background: rgba(59, 130, 246, 0.1);
      border-left: 3px solid #3b82f6;
      border-radius: 0 8px 8px 0;
      transition: all 0.3s ease;
    }
    .company-item:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateX(5px);
    }
  </style>
</head>
<body style="overflow-y: auto; background: #0f172a;">
  <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-4" id="main-nav">
    <div class="max-w-[1600px] mx-auto px-8 flex items-center justify-between">
      <div class="flex items-center">
        <a href="../index.html" class="flex items-center gap-2">
          <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-600 to-yellow-500 flex items-center justify-center">
            <i class="fas fa-brain text-white text-xl"></i>
          </div>
          <div>
            <div class="text-white font-bold text-lg">鄄城县发制品产业大脑</div>
            <div class="text-xs text-gray-400">Industry Brain Platform</div>
          </div>
        </a>
      </div>
      <div class="hidden md:flex items-center gap-8">
        <a href="../index.html" class="nav-link text-gray-300 hover:text-white">首页</a>
        <a href="cockpit.html" class="nav-link text-gray-300 hover:text-white">产业全景</a>
        <a href="industry-map.html" class="nav-link active text-white">产业透视</a>
        <a href="monitor.html" class="nav-link text-gray-300 hover:text-white">安全防控</a>
        <a href="enterprise.html" class="nav-link text-gray-300 hover:text-white">企业画像</a>
        <a href="supply.html" class="nav-link text-gray-300 hover:text-white">资源枢纽</a>
        <a href="market.html" class="nav-link text-gray-300 hover:text-white">市场洞察</a>
        <a href="government.html" class="nav-link text-gray-300 hover:text-white">政务服务</a>
        <a href="shop.html" class="nav-link text-gray-300 hover:text-white">发品交易</a>
        <a href="hr.html" class="nav-link text-gray-300 hover:text-white">人力资源</a>
        <a href="finance.html" class="nav-link text-gray-300 hover:text-white">金融服务</a>
        <a href="thinktank.html" class="nav-link text-gray-300 hover:text-white">发业智库</a>
        <a href="traceability.html" class="nav-link text-gray-300 hover:text-white">发品溯源</a>
      </div>
      <div class="flex items-center gap-4">
        <a href="../admin/index.html" class="hidden md:flex items-center gap-2 text-gray-300 hover:text-white">
          <i class="fas fa-cog"></i><span>后台管理</span>
        </a>
        <a href="../index.html" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i><span>退出系统</span></a>
      </div>
    </div>
  </nav>

  <div class="max-w-[1600px] mx-auto pt-24 px-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px; color: #fff;">发制品行业图谱</h1>
        <p style="color: #94a3b8; font-size: 14px;">全景展示发制品产业生态链与企业关系</p>
      </div>
      <div class="flex gap-3">
        <button class="btn btn-outline"><i class="fas fa-expand"></i> 全屏查看</button>
        <button class="btn btn-primary"><i class="fas fa-download"></i> 导出图谱</button>
      </div>
    </div>

    <div class="card mb-6" style="background: #1e293b; border: 1px solid #334155;">
      <div class="card-header" style="border-bottom: 1px solid #334155; padding: 16px 20px;">
        <div class="card-title" style="color: #fff;"><i class="fas fa-project-diagram"></i> 产业链图谱</div>
        <div class="flex gap-2">
          <button class="btn btn-outline filter-btn active" data-filter="all" style="padding: 6px 12px; font-size: 12px;">全景</button>
          <button class="btn btn-outline filter-btn" data-filter="upstream" style="padding: 6px 12px; font-size: 12px;">上游</button>
          <button class="btn btn-outline filter-btn" data-filter="midstream" style="padding: 6px 12px; font-size: 12px;">中游</button>
          <button class="btn btn-outline filter-btn" data-filter="downstream" style="padding: 6px 12px; font-size: 12px;">下游</button>
        </div>
      </div>
      <div class="map-container">
        <div id="industryChainChart" style="width: 100%; height: 600px;"></div>
      </div>
    </div>

    <!-- 企业信息展示面板 -->
    <div id="company-info-panel">
      <h3 id="info-title" style="margin: 0 0 15px 0; color: #fff; font-size: 18px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">
        <i class="fas fa-info-circle" style="color: #3b82f6; margin-right: 8px;"></i>
        点击地图上的流动线，查看具体企业信息
      </h3>
      <div id="flow-info" style="color: #94a3b8; margin-bottom: 15px; font-size: 14px;"></div>
      <ul id="company-list" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>
  </div>

  <script>
    window.addEventListener('scroll', function() {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 10) nav.classList.add('nav-scrolled');
      else nav.classList.remove('nav-scrolled');
    });

    document.addEventListener('DOMContentLoaded', function() {
      initIndustryChainChart();
    });

    function initIndustryChainChart() {
      const chartDom = document.getElementById('industryChainChart');
      const myChart = echarts.init(chartDom);

      // 节点数据 - 添加category属性
      const nodes = [
        { name: '山东鄄城', value: 100, coord: [115.5, 35.57], category: 'hub' },
        { name: '印度', value: 40, coord: [78.96, 20.59], category: 'upstream' },
        { name: '东南亚', value: 30, coord: [110.0, 13.0], category: 'upstream' },
        { name: '河南许昌', value: 50, coord: [113.85, 34.04], category: 'upstream' },
        { name: '江浙地区', value: 35, coord: [120.2, 30.3], category: 'upstream' },
        { name: '山东青岛', value: 45, coord: [120.38, 36.07], category: 'midstream' },
        { name: '美国', value: 70, coord: [-95.71, 37.09], category: 'downstream' },
        { name: '欧洲', value: 40, coord: [10.0, 50.0], category: 'downstream' },
        { name: '非洲', value: 50, coord: [20.0, 5.0], category: 'downstream' },
        { name: '日韩', value: 30, coord: [135.0, 35.0], category: 'downstream' }
      ];

      // 流动线数据 - 添加category和info属性
      const links = [
        {
          source: '印度', target: '山东鄄城', value: 40, category: 'upstream',
          info: {
            title: '印度 → 山东鄄城（原料供应）',
            flowType: '真人发原料进口',
            companies: ['印度瑞贝卡发业原料公司', '孟买长发贸易集团', '印度AAA原料供应商', '环球发制品供应链(印度)公司']
          }
        },
        {
          source: '东南亚', target: '山东鄄城', value: 30, category: 'upstream',
          info: {
            title: '东南亚 → 山东鄄城（原料供应）',
            flowType: '化纤丝与真人发采购',
            companies: ['泰国曼谷发业贸易公司', '越南胡志明原料出口商', '东南亚BBB化纤供应商', '东盟发制品原料联盟']
          }
        },
        {
          source: '河南许昌', target: '山东鄄城', value: 50, category: 'upstream',
          info: {
            title: '河南许昌 → 山东鄄城（原料供应）',
            flowType: '国内回收档发供应',
            companies: ['许昌瑞贝卡发制品公司', '河南长发回收集团', '中原发业原料公司', '许昌CCC档发贸易商']
          }
        },
        {
          source: '江浙地区', target: '山东鄄城', value: 35, category: 'upstream',
          info: {
            title: '江浙地区 → 山东鄄城（辅料供应）',
            flowType: '辅料与化纤丝供应',
            companies: ['浙江网帽制品公司', '江苏化纤丝供应商', '上海发业辅料公司', '江浙DDD辅料贸易集团']
          }
        },
        {
          source: '山东鄄城', target: '山东青岛', value: 20, category: 'midstream',
          info: {
            title: '山东鄄城 → 山东青岛（中游协作）',
            flowType: '半成品加工协作',
            companies: ['鄄城发业加工基地', '青岛假发制造公司', '山东发制品协作联盟', '青岛EEE出口加工厂']
          }
        },
        {
          source: '山东青岛', target: '山东鄄城', value: 15, category: 'midstream',
          info: {
            title: '山东青岛 → 山东鄄城（中游协作）',
            flowType: '成品回流与再加工',
            companies: ['青岛外贸发业公司', '鄄城精加工厂', '山东发制品物流中心', '青岛FFF贸易公司']
          }
        },
        {
          source: '山东鄄城', target: '美国', value: 70, category: 'downstream',
          info: {
            title: '山东鄄城 → 美国（成品出口）',
            flowType: '高端发套与假发出口',
            companies: ['鄄城YYY发制品集团', '美国BBB品牌进口商', '洛杉矶发业贸易公司', '纽约假发分销商']
          }
        },
        {
          source: '山东鄄城', target: '欧洲', value: 40, category: 'downstream',
          info: {
            title: '山东鄄城 → 欧洲（成品出口）',
            flowType: '时尚与医疗假发出口',
            companies: ['欧洲CCC进口商', '德国假发分销公司', '法国时尚发业公司', '伦敦医疗假发供应商']
          }
        },
        {
          source: '山东鄄城', target: '非洲', value: 50, category: 'downstream',
          info: {
            title: '山东鄄城 → 非洲（成品出口）',
            flowType: '发条与发饰出口',
            companies: ['尼日利亚发业进口商', '南非假发贸易公司', '肯尼亚发饰分销商', '非洲DDD发业集团']
          }
        },
        {
          source: '山东鄄城', target: '日韩', value: 30, category: 'downstream',
          info: {
            title: '山东鄄城 → 日韩（成品出口）',
            flowType: '高品质假发出口',
            companies: ['日本东京发业进口商', '韩国首尔假发公司', '大阪发制品分销商', '日韩EEE贸易联盟']
          }
        }
      ];

      // 颜色配置
      const colors = {
        'hub': '#FF0000',
        'upstream': '#9a60b4',
        'midstream': '#91cc75',
        'downstream': '#ee6666'
      };

      // 构建节点数据
      const nodesData = nodes.map(item => ({
        name: item.name,
        value: item.coord.concat(item.value),
        category: item.category,
        symbolSize: item.category === 'hub' ? 50 : 20 + item.value * 0.3,
        itemStyle: {
          color: colors[item.category],
          shadowBlur: item.category === 'hub' ? 30 : 15,
          shadowColor: colors[item.category]
        },
        label: {
          show: true,
          position: item.category === 'hub' ? 'top' : 'right',
          formatter: item.category === 'hub' ? '{a|' + item.name + '}' : item.name,
          color: '#fff',
          fontSize: item.category === 'hub' ? 16 : 12,
          fontWeight: item.category === 'hub' ? 'bold' : 'normal',
          rich: {
            a: {
              fontSize: 20,
              fontWeight: 'bold',
              color: '#FF0000',
              padding: [8, 12],
              backgroundColor: 'rgba(0,0,0,0.6)',
              borderRadius: 8,
              borderColor: '#FF0000',
              borderWidth: 2
            }
          }
        }
      }));

      // 构建飞线数据
      const linesData = links.map(link => ({
        coords: [nodes.find(n => n.name === link.source).coord, nodes.find(n => n.name === link.target).coord],
        value: link.value,
        category: link.category,
        info: link.info,
        lineStyle: {
          color: colors[link.category],
          width: 2 + link.value / 15,
          opacity: 0.8,
          curveness: 0.2
        }
      }));

      const option = {
        backgroundColor: '#1a1a2e',
        title: {
          text: '发制品全球产业链枢纽：山东鄄城',
          left: 'center',
          top: 10,
          textStyle: { color: '#fff', fontSize: 18, fontWeight: 'bold' }
        },
        tooltip: {
          trigger: 'item',
          formatter: function(params) {
            if (params.seriesType === 'effectScatter') {
              return `<div style="font-weight:bold;color:#fff;">${params.name}</div>
                      <div style="color:#ccc;font-size:12px;">${getCategoryName(params.data.category)}</div>`;
            } else if (params.seriesType === 'lines') {
              return `<div style="font-weight:bold;color:#fff;">${params.data.info.title}</div>
                      <div style="color:#ccc;font-size:12px;">流量值: ${params.data.value}</div>`;
            }
          },
          backgroundColor: 'rgba(0,0,0,0.8)',
          borderColor: '#3a3a5e',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        geo: {
          map: 'china',
          roam: true,
          zoom: 1.2,
          center: [105, 35],
          label: { show: true, color: '#fff', fontSize: 10 },
          itemStyle: {
            areaColor: '#1c1c3e',
            borderColor: '#3a3a5e',
            borderWidth: 1
          },
          emphasis: {
            itemStyle: { areaColor: '#2a2a4e' },
            label: { color: '#fff' }
          }
        },
        series: [
          {
            name: '产业链流向',
            type: 'lines',
            coordinateSystem: 'geo',
            zlevel: 1,
            data: linesData,
            effect: {
              show: true,
              period: 4,
              trailLength: 0.4,
              symbol: 'arrow',
              symbolSize: 8,
              color: '#fff'
            },
            lineStyle: { curveness: 0.2 },
            emphasis: {
              lineStyle: { width: 6, opacity: 1 }
            },
            select: {
              lineStyle: { width: 6, opacity: 1 }
            }
          },
          {
            name: '产业链节点',
            type: 'effectScatter',
            coordinateSystem: 'geo',
            data: nodesData,
            symbolSize: function(val) { return val[2] / 2; },
            showEffectOn: 'render',
            rippleEffect: {
              brushType: 'stroke',
              scale: item => item.category === 'hub' ? 5 : 3,
              period: 4
            },
            emphasis: {
              scale: true,
              itemStyle: {
                shadowBlur: 30,
                shadowColor: 'rgba(255,255,255,0.8)'
              }
            }
          }
        ]
      };

      myChart.setOption(option);

      // 辅助函数：获取类别中文名
      function getCategoryName(cat) {
        const names = { 'hub': '核心枢纽', 'upstream': '上游原料', 'midstream': '中游生产', 'downstream': '下游市场' };
        return names[cat] || cat;
      }

      // 筛选功能
      const filterBtns = document.querySelectorAll('.filter-btn');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const filter = this.dataset.filter;
          
          // 更新按钮状态
          filterBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          
          // 筛选数据
          let newLineData, newNodeData;
          if (filter === 'all') {
            newLineData = linesData;
            newNodeData = nodesData;
          } else {
            newLineData = linesData.filter(link => link.category === filter);
            // 节点：保留筛选类别的节点 + 核心枢纽
            newNodeData = nodesData.filter(node => 
              node.category === filter || node.category === 'hub'
            );
          }
          
          myChart.setOption({
            series: [
              { data: newLineData },
              { data: newNodeData }
            ]
          });
          
          // 隐藏信息面板
          document.getElementById('company-info-panel').classList.remove('show');
        });
      });

      // 点击线段显示企业信息
      myChart.on('click', function(params) {
        if (params.seriesType === 'lines' && params.data && params.data.info) {
          const info = params.data.info;
          const panel = document.getElementById('company-info-panel');
          const titleEl = document.getElementById('info-title');
          const flowInfoEl = document.getElementById('flow-info');
          const listEl = document.getElementById('company-list');

          // 更新标题
          titleEl.innerHTML = `<i class="fas fa-route" style="color: #3b82f6; margin-right: 8px;"></i>${info.title}`;
          
          // 更新流向信息
          flowInfoEl.innerHTML = `<i class="fas fa-exchange-alt" style="margin-right: 5px;"></i>业务类型：${info.flowType}`;

          // 生成企业列表
          listEl.innerHTML = '';
          info.companies.forEach((company, index) => {
            const li = document.createElement('li');
            li.className = 'company-item';
            li.innerHTML = `
              <i class="fas fa-building" style="color: #3b82f6; margin-right: 10px;"></i>
              <span style="color: #e2e8f0;">${company}</span>
            `;
            li.style.animationDelay = `${index * 0.1}s`;
            listEl.appendChild(li);
          });

          // 显示面板
          panel.classList.add('show');

          // 高亮选中线段
          myChart.dispatchAction({
            type: 'select',
            seriesIndex: 0,
            dataIndex: params.dataIndex
          });
        }
      });

      // 点击空白处隐藏信息面板
      myChart.getZr().on('click', function(event) {
        if (!event.target) {
          document.getElementById('company-info-panel').classList.remove('show');
          myChart.dispatchAction({ type: 'unselect', seriesIndex: 0 });
        }
      });

      window.addEventListener('resize', () => myChart.resize());
    }
  </script>
</body>
</html>
