    .nav-link {
      position: relative;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .nav-link:hover {
      color: #c9a227;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #1a5fb4, #c9a227);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .nav-link.active {
      color: #c9a227;
    }
    .nav-link.active::after {
      width: 100%;
    }
    .nav-scrolled {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    /* 卡片内容样式 */
    .card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 18px;
      padding: 32px;
      border: 1px solid rgba(26, 95, 180, 0.1);
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1a5fb4, #c9a227);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(26, 95, 180, 0.25);
      border-color: rgba(26, 95, 180, 0.3);
    }

    /* 按钮样式增强 */
    .btn-primary {
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 95, 180, 0.3);
    }

    /* 标签样式 */
    .tag {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 12px;
    }

    /* 展会信息样式 */
    .exhibition-info {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 32px;
      padding: 32px;
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
      border-radius: 20px;
      border: 1px solid rgba(26, 95, 180, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(26, 95, 180, 0.1);
    }
    
    .exhibition-status {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .exhibition-info:hover .exhibition-status {
      transform: scale(1.05);
    }
    
    .status-upcoming {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
    }
    
    .status-ongoing {
      background: linear-gradient(135deg, #10b981, #34d399);
    }
    
    .status-completed {
      background: linear-gradient(135deg, #1a5fb4, #3b82f6);
    }
    
    .exhibition-details {
      flex: 1;
    }
    
    .detail-item {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      padding: 8px 0;
    }
    
    .detail-item:last-child {
      margin-bottom: 0;
    }
    
    .detail-label {
      font-size: 15px;
      color: var(--text-secondary);
      min-width: 90px;
      font-weight: 500;
    }
    
    .detail-value {
      font-size: 15px;
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      padding: 8px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    
    .tab-item {
      padding: 14px 28px;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 15px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    
    .tab-item.active {
      background: linear-gradient(135deg, #1a5fb4, #2563eb);
      color: white;
      border-color: rgba(26, 95, 180, 0.3);
      box-shadow: 0 6px 16px rgba(26, 95, 180, 0.3);
    }
    
    .tab-item:hover:not(.active) {
      background: rgba(26, 95, 180, 0.1);
      color: #1a5fb4;
      border-color: rgba(26, 95, 180, 0.2);
      transform: translateY(-2px);

    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .exhibition-content {
      line-height: 1.6;
      font-size: 16px;
    }

      font-size: 24px;
      font-weight: 600;
      margin: 32px 0 16px 0;
    }
    
    .exhibition-content h3 {
      font-size: 20px;
      font-weight: 600;
      margin: 24px 0 12px 0;
    }
    
    .exhibition-content p {
      margin-bottom: 16px;

      margin: 16px 0;
      padding-left: 24px;
    }
    
    .exhibition-content li {
      margin-bottom: 8px;
    }
    
    .exhibition-highlight {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1));

      font-weight: 600;

      align-items: center;
      gap: 8px;

      background: rgba(15, 20, 41, 0.6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    
    .exhibition-timeline {
      position: relative;
      padding-left: 40px;
    }
    
    .timeline-item {
      position: relative;
      margin-bottom: 24px;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -40px;
      top: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      border: 4px solid var(--bg-primary);
    }
    
    .timeline-item::after {
      content: '';
      position: absolute;
      left: -33px;
      top: 16px;
      width: 2px;
      height: calc(100% + 8px);
      background: var(--border-color);
    }
    
    .timeline-item:last-child::after {
      display: none;
    }
    
    .timeline-time {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }
    
    .timeline-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .timeline-content {
      font-size: 14px;
      color: var(--text-secondary);

            <div class="flex flex-wrap gap-4">
              <div class="detail-item">
                <span class="detail-label">展会状态：</span>
                <span class="detail-value">
                  <span class="tag ${exhibition.status === 'ongoing' ? 'tag-success' : exhibition.status === 'upcoming' ? 'tag-warning' : 'tag-info'}">${exhibition.statusText}</span>
                </span>
              </div>
              <div class="detail-item">
                <span class="detail-label">展会时间：</span>
                <span class="detail-value">${exhibition.startTime} 至 ${exhibition.endTime}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">展会地点：</span>
                <span class="detail-value">${exhibition.location}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">详细地址：</span>
                <span class="detail-value">${exhibition.address}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">主办单位：</span>
                <span class="detail-value">${exhibition.organizer}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">官方网站：</span>
                <span class="detail-value">
                  <a href="http://${exhibition.website}" target="_blank" style="color: var(--primary); text-decoration: underline;">${exhibition.website}</a>
                </span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 标签导航 -->
        <div class="tab-nav">
          <div class="tab-item active" data-tab="overview">展会概况</div>
          <div class="tab-item" data-tab="products">展品范围</div>
          <div class="tab-item" data-tab="schedule">展会日程</div>
          <div class="tab-item" data-tab="exhibitors">参展企业</div>
        </div>
        
        <!-- 标签内容 -->
        <!-- 展会概况 -->
        <div class="tab-content active" id="overview">
          <div class="card">
            <div class="exhibition-content">
              <p>${exhibition.description}</p>
              
              <div class="exhibition-highlight">
                <h3>展会亮点</h3>
                <ul>
                  ${exhibition.highlights.map(highlight => `<li>${highlight}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 展会日程 -->
        <div class="tab-content" id="schedule">
          <div class="card">
            <div class="exhibition-timeline">
              ${exhibition.schedule.map(item => `
                <div class="timeline-item">
                  <div class="timeline-time">${item.time}</div>
                  <div class="timeline-title">${item.title}</div>
                  <div class="timeline-content">${item.content}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        
        <!-- 展品范围 -->
        <div class="tab-content" id="products">
          <div class="card">
            <div class="exhibition-content">
              <div style="margin-bottom: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">发制品</h3>
                <p style="line-height: 1.6;">男女假发、工艺发条、教习发、接发、发块、发把、手织发、眼睫毛、化学纤维、天然仿制原料等其他假发类原材料、生产设备以及跨境电商服务商等；</p>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">美睫美甲</h3>
                <p style="line-height: 1.6;">假睫毛定制、睫毛原材料、胶水、包装设备、OEM、COM、直播网红选品、跨境电商及服务机构，涵盖美甲耗材、美甲硬件、美甲工具等；</p>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">美发用品</h3>
                <p style="line-height: 1.6;">洗护烫染等美发用品，发剪、发梳、电吹风、电推剪、电夹板等美发工具、烫发机、理髲椅等美发设备，加盟教育培训机构、管理操作设备、软件等新产品技术；</p>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">植发科技</h3>
                <p style="line-height: 1.6;">植发、补发与技术加盟培训机构、毛发移植设备与产品、发医疗机构等；</p>
              </div>
              
              <div style="margin-bottom: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">养发育发</h3>
                <p style="line-height: 1.6;">头皮护理产品等加盟培训机构、头皮检测设备、天然养发育发产品、白转黑等产品以及养发育发连锁机构等；</p>
              </div>
              
              <div>
                <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 12px;">发饰品</h3>
                <p style="line-height: 1.6;">发夹、头花、发珠、发带、发簪、发环等头饰产品。</p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- 展会日程 -->
        <div class="tab-content" id="schedule">
          <div class="card">
            <div class="exhibition-timeline">
              ${exhibition.schedule.map(item => `
                <div class="timeline-item">
                  <div class="timeline-time">${item.time}</div>
                  <div class="timeline-title">${item.title}</div>
                  <div class="timeline-content">${item.content}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        
        <!-- 参展企业 -->
        <div class="tab-content" id="exhibitors">
          <div class="card">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${exhibition.exhibitors.map(exhibitor => `
                <div style="background: var(--bg-primary); border-radius: 12px; padding: 20px; border: 1px solid var(--border-color);">
                  <div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">${exhibitor.name}</div>
                  <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 4px;">展位：${exhibitor.booth}</div>
                  <div style="font-size: 14px; color: var(--text-secondary);">类别：${exhibitor.category}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
      
      // 添加标签切换功能
      setupTabNavigation();
    }
    
    // 设置标签导航
    function setupTabNavigation() {
      document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', function() {
          const tabId = this.dataset.tab;
          
          // 更新标签状态
          document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          
          // 更新内容显示
          document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
          });
          document.getElementById(tabId).classList.add('active');
        });
      });
    }
    
    // 页面加载完成后加载展会内容
    window.addEventListener('DOMContentLoaded', loadExhibitionContent);
  </script>
</body>
</html>
