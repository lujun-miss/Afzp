<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nav-link {
      position: relative;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .nav-link:hover {
      color: #c9a227;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #1a5fb4, #c9a227);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .nav-link.active {
      color: #c9a227;
    }
    .nav-link.active::after {
      width: 100%;
    }
    .nav-scrolled {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200">

        <button class="btn btn-primary" onclick="window.location.href='register.html'">注册</button>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->

            </div>
            <h4 style="font-weight: 600; font-size: 18px; margin-bottom: 8px;">供应链管理</h4>

          </div>
        </div>

            <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6;">产品质量认证和检测服务</p>
            <button class="btn btn-primary" style="padding: 8px 24px; font-size: 14px; font-weight: 500;">了解更多</button>

  <!-- 页脚 -->

        <a href="#" class="hover:text-white transition-colors">隐私政策</a>
        <a href="#" class="hover:text-white transition-colors">使用条款</a>
      </div>
    </div>
  </footer>

  <script>
    // 导航栏滚动效果
    window.addEventListener('scroll', function() {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 10) {
        nav.classList.add('nav-scrolled');
      } else {
        nav.classList.remove('nav-scrolled');
      }
    });
  </script>
</body>
</html>
