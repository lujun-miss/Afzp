            // 根据标签类型高亮企业和关系线
            function highlightByLabel(labelType) {
                clearHighlight();
                
                // 确定要高亮的企业类型
                let targetTypes = [];
                if (labelType === 'upstream') {
                    targetTypes = ['supplier'];
                } else if (labelType === 'midstream') {
                    targetTypes = ['manufacturer'];
                } else if (labelType === 'downstream') {
                    targetTypes = ['trade', 'logistics'];
                } else if (labelType === 'service') {
                    targetTypes = ['service'];
                } else if (labelType === 'all') {
                    // 全部选项，高亮所有企业
                    targetTypes = ['supplier', 'manufacturer', 'trade', 'logistics', 'service'];
                }

                // 高亮对应类型的企业标记
                companies.forEach(company => {
                    const marker = markers[company.id];
                    if (marker) {
                        const iconEl = marker.getElement();
                        if (iconEl) {
                            const markerDiv = iconEl.querySelector('.custom-marker');
                            if (markerDiv) {
                                if (targetTypes.includes(company.type)) {
                                    markerDiv.classList.add('active');
                                    markerDiv.classList.remove('dimmed');
                                } else {
                                    markerDiv.classList.remove('active');
                                    markerDiv.classList.add('dimmed');
                                }
                            }
                        }
                    }
                });

                // 隐藏所有关系线（按照优化方案，关系线只在点击企业时显示）
                Object.values(relationshipLines).forEach(lineData => {
                    lineData.line.setStyle({
                        opacity: 0
                    });
                });
            }

            // 处理企业点击
            function handleCompanyClick(company) {
                console.log('处理企业点击:', company.name);
                
                // 显示企业详情弹窗
                const infoEl = document.getElementById('companyInfo');
                infoEl.style.display = 'block';
                infoEl.style.zIndex = '999999';
                infoEl.style.position = 'fixed';
                infoEl.style.top = '50px';
                infoEl.style.right = '20px';
                
                console.log('企业详情弹窗显示:', infoEl.style.display);
                
                // 设置企业信息
                document.getElementById('companyName').textContent = company.name;
                document.getElementById('companyLegalPerson').textContent = company.legalPerson || '未知';
                document.getElementById('companyEstablishment').textContent = company.establishmentDate || '未知';
                document.getElementById('companyCapital').textContent = company.registeredCapital || '未知';
                document.getElementById('companyAddress').textContent = company.address || '未知';
                document.getElementById('companyBusinessScope').textContent = company.businessScope || '未知';
                
                // 更新产业定位标签
                const tagsContainer = document.getElementById('companyIndustryTags');
                tagsContainer.innerHTML = '';
                if (company.industryTags && company.industryTags.length > 0) {
                    company.industryTags.forEach(tag => {
                        const tagEl = document.createElement('span');
                        tagEl.textContent = tag;
                        tagEl.style.cssText = 'background: rgba(0, 242, 254, 0.1); color: #00f2fe; border: 1px solid #00f2fe; padding: 3px 8px; font-size: 12px; border-radius: 12px; margin-right: 5px; margin-bottom: 5px;';
                        tagsContainer.appendChild(tagEl);
                    });
                }
                
                console.log('企业详情已显示');
                
                // 找出所有相关的企业（上游和下游）
                const upstreamCompanies = [];
                const downstreamCompanies = [];
                
                // 找出上游企业（供应商）
                relationships.forEach(rel => {
                    if (rel.target === company.id) {
                        const upstreamCompany = companies.find(c => c.id === rel.source);
                        if (upstreamCompany) {
                            upstreamCompanies.push(upstreamCompany);
                        }
                    }
                });
                
                // 找出下游企业（客户）
                relationships.forEach(rel => {
                    if (rel.source === company.id) {
                        const downstreamCompany = companies.find(c => c.id === rel.target);
                        if (downstreamCompany) {
                            downstreamCompanies.push(downstreamCompany);
                        }
                    }
                });
                
                // 更新左侧企业列表显示上下游关联企业
                updateCompanyListForRelationship(company, upstreamCompanies, downstreamCompanies);
                
                // 清除之前的高亮
                clearHighlight();
                
                // 高亮当前企业
                const markerEl = markers[company.id].getElement();
                if (markerEl) {
                    markerEl.querySelector('.custom-marker').classList.add('active');
                }
                
                // 高亮相关企业和关系线
                const allRelatedCompanies = [...upstreamCompanies, ...downstreamCompanies];
                allRelatedCompanies.forEach(relatedCompany => {
                    const markerEl = markers[relatedCompany.id].getElement();
                    if (markerEl) {
                        markerEl.querySelector('.custom-marker').classList.add('dimmed');
                    }
                });
                
                // 显示与当前企业相关的关系线
                relationships.forEach((rel, index) => {
                    if (rel.source === company.id || rel.target === company.id) {
                        const lineData = relationshipLines[index];
                        if (lineData) {
                            // 根据关系类型设置不同的颜色
                            let lineColor;
                            if (rel.source === company.id) {
                                // 下游关系（从当前企业出发）
                                lineColor = '#00f2fe';
                            } else {
                                // 上游关系（指向当前企业）
                                lineColor = '#4CAF50';
                            }
                            
                            lineData.line.setStyle({
                                color: lineColor,
                                weight: 3,
                                opacity: 1,
                                className: 'relationship-line-highlight'
                            });
                        }
                    }
                });

                // 淡化不相关的企业和关系线
                companies.forEach(c => {
                    const isRelated = c.id === company.id || 
                        upstreamCompanies.some(upstream => upstream.id === c.id) ||
                        downstreamCompanies.some(downstream => downstream.id === c.id);
                    
                    if (!isRelated) {
                        const markerEl = markers[c.id].getElement();
                        if (markerEl) {
                            markerEl.querySelector('.custom-marker').classList.add('dimmed');
                        }
                    }
                });

                // 更新企业列表 - 已经在前面调用了 updateCompanyListForRelationship
            }

                    }
                    
                    html += `</div>`;
                    
                    // 创建内容区域
                    html += `<div id="tab-content">`;
                    
                    // 上游企业内容
                    if (upstreamCompanies.length > 0) {
                        html += `<div id="content-upstream" ${downstreamCompanies.length > 0 ? '' : 'style="display: block;"'}>`;
                        upstreamCompanies.forEach(upstream => {

                            html += `<div style="font-size: 12px; color: #ccc; margin-top: 2px;">法人: ${upstream.legalPerson || '未知'} | 成立: ${upstream.establishmentDate || '未知'}</div>`;
                            html += `<div style="font-size: 11px; color: #999; margin-top: 1px;">地址: ${upstream.address}</div>`;
                            html += `<div style="font-size: 11px; color: #999; margin-top: 1px;">注册资本: ${upstream.registeredCapital || '未知'}</div>`;
                            html += `<div style="margin-top: 5px;">`;
                            html += `<button onclick="viewCompanyProfile(${upstream.id})" style="width: 100%; background: #333; color: #00f2fe; border: 1px solid #00f2fe; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer;">企业档案</button>`;
                            html += `</div>`;
                            html += '</div>';
                        });
                        html += `</div>`;
                    }
                    
                    // 下游企业内容（根据情况决定是否默认隐藏）
                    if (downstreamCompanies.length > 0) {
                        html += `<div id="content-downstream" ${upstreamCompanies.length > 0 ? 'style="display: none;"' : 'style="display: block;"'}>`;
                        downstreamCompanies.forEach(downstream => {
                            html += `<div class="company-item" data-company-id="${downstream.id}" style="background: rgba(250, 200, 88, 0.1); border: 1px solid #fac858; padding: 10px; border-radius: 6px; margin-bottom: 8px;">`;
                            html += `<div style="color: #fac858; font-size: 14px; font-weight: bold;">${downstream.name}</div>`;
                            html += `<div style="font-size: 12px; color: #ccc; margin-top: 2px;">法人: ${downstream.legalPerson || '未知'} | 成立: ${downstream.establishmentDate || '未知'}</div>`;
                            html += `<div style="font-size: 11px; color: #999; margin-top: 1px;">地址: ${downstream.address}</div>`;
                            html += `<div style="font-size: 11px; color: #999; margin-top: 1px;">注册资本: ${downstream.registeredCapital || '未知'}</div>`;
                            html += `<div style="display: flex; gap: 5px; margin-top: 5px;">`;
                            html += `<button onclick="handleCompanyClick(companies.find(c => c.id === ${downstream.id}))" style="flex: 1; background: #00f2fe; color: #000; border: none; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer;">查看详情</button>`;

                    }
                    
                    html += `</div>`;
                } else {
                    html += `<div style="color: #aaa; font-size: 12px; margin-top: 10px;">暂无关联企业</div>`;

            // 选项卡切换函数
            function switchTab(tabName) {
                // 隐藏所有内容
                document.getElementById('content-upstream').style.display = 'none';
                document.getElementById('content-downstream').style.display = 'none';
                
                // 重置所有选项卡样式
                document.getElementById('tab-upstream').style.background = '#333';
                document.getElementById('tab-upstream').style.color = '#00f2fe';
                document.getElementById('tab-upstream').style.border = '1px solid #00f2fe';
                
                document.getElementById('tab-downstream').style.background = '#333';
                document.getElementById('tab-downstream').style.color = '#00f2fe';
                document.getElementById('tab-downstream').style.border = '1px solid #00f2fe';
                
                // 显示选中的内容
                document.getElementById('content-' + tabName).style.display = 'block';
                
                // 设置选中选项卡样式
                document.getElementById('tab-' + tabName).style.background = '#00f2fe';
                document.getElementById('tab-' + tabName).style.color = '#000';
                document.getElementById('tab-' + tabName).style.border = 'none';
            }

            // 更新企业列表
            function updateCompanyList(selectedCompany, relatedCompanies) {
                const companyListEl = document.getElementById('companyList');
                
                // 按类型分组企业
                const groupedCompanies = {
                    upstream: [],
                    midstream: [],
                    downstream: []
                };

                // 分类相关企业
                relatedCompanies.forEach(companyId => {
                    const company = companies.find(c => c.id === companyId);
                    if (company) {
                        if (company.type === 'supplier') {
                            groupedCompanies.upstream.push(company);
                        } else if (company.type === 'manufacturer') {
                            groupedCompanies.midstream.push(company);
                        } else if (company.type === 'trade' || company.type === 'logistics') {
                            groupedCompanies.downstream.push(company);
                        }
                    }
                });

                // 生成HTML
                let html = '';

                // 上游企业
                if (groupedCompanies.upstream.length > 0) {
                    groupedCompanies.upstream.forEach(company => {
                        const isActive = company.id === selectedCompany.id;
                        html += `<div class="company-item ${isActive ? 'active' : ''}" data-company-id="${company.id}">`;
                        html += `<div style="color: #00f2fe; font-size: 15px; font-weight: bold;">上游企业 ${company.name}</div>`;
                        html += '</div>';
                    });
                }

                // 中游企业
                if (groupedCompanies.midstream.length > 0) {
                    groupedCompanies.midstream.forEach(company => {
                        const isActive = company.id === selectedCompany.id;
                        html += `<div class="company-item ${isActive ? 'active' : ''}" data-company-id="${company.id}">`;
                        html += `<div style="color: #00f2fe; font-size: 15px; font-weight: bold;">中游企业 ${company.name}</div>`;
                        html += '</div>';
                    });
                }

                // 下游企业
                if (groupedCompanies.downstream.length > 0) {
                    html += '<div class="company-item" style="margin-top: 15px;">';
                    html += '<div style="color: #00f2fe; font-size: 15px; font-weight: bold;">关联企业</div>';
                    html += '<div style="color: #e6f7ff; font-size: 13px;">下游企业：' + groupedCompanies.downstream.map(c => c.name).join('、') + '</div>';
                    html += '</div>';
                }

                companyListEl.innerHTML = html;

                // 添加列表项点击事件
                document.querySelectorAll('.company-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const companyId = parseInt(this.dataset.companyId);
                        console.log('企业列表项点击:', companyId);
                        if (companyId) {
                            const company = companies.find(c => c.id === companyId);
                            if (company) {
                                console.log('找到企业:', company.name);
                                handleCompanyClick(company);
                            } else {
                                console.log('未找到企业:', companyId);
                            }
                        } else {
                            console.log('无效的企业ID');
                        }
                    });
                });
            }

            // 清除高亮
            function clearHighlight() {
                // 清除所有标记的高亮和淡化
                Object.values(markers).forEach(marker => {
                    const markerEl = marker.getElement();
                    if (markerEl) {
                        const customMarker = markerEl.querySelector('.custom-marker');
                        customMarker.classList.remove('active', 'dimmed');
                    }
                });

                // 隐藏所有关系线
                Object.values(relationshipLines).forEach(lineData => {
                    lineData.line.setStyle({
                        opacity: 0
                    });
                });
            }
