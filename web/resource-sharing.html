<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资源共享 - 鄄城县发制品产业大脑</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nav-link {
      position: relative;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .nav-link:hover {
      color: #c9a227;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #1a5fb4, #c9a227);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .nav-link.active {
      color: #c9a227;
    }
    .nav-link.active::after {
      width: 100%;
    }
    .nav-scrolled {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200">
  <!-- 导航栏 -->
  <nav id="main-nav" class="fixed top-0 left-0 right-0 z-50 bg-transparent transition-all duration-300">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <a href="index.html" class="flex items-center gap-2">
          <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #1a5fb4, #c9a227); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-industry text-white text-xl"></i>
          </div>
          <span class="text-xl font-bold text-white">发制品产业大脑</span>
        </a>
      </div>
      
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="nav-link">首页</a>
        <a href="supply.html" class="nav-link active">资源枢纽</a>
        <a href="market.html" class="nav-link">市场分析</a>
        <a href="enterprise.html" class="nav-link">企业服务</a>
        <a href="traceability.html" class="nav-link">溯源管理</a>
        <a href="government.html" class="nav-link">政策服务</a>
        <a href="thinktank.html" class="nav-link">行业智库</a>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="btn btn-outline" onclick="window.location.href='login.html'">登录</button>
        <button class="btn btn-primary" onclick="window.location.href='register.html'">注册</button>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <div class="pt-24 pb-16">
    <div class="container mx-auto px-4">
      <!-- 页面标题 -->
      <div class="mb-10 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-4">资源共享</h1>
        <p class="text-gray-400 max-w-3xl mx-auto">设备租赁、场地共享、技术转让，优化资源配置，降低企业运营成本</p>
      </div>

      <!-- 资源分类 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="card" style="border-radius: 16px; padding: 24px; text-align: center;" onclick="showResourceType('equipment')">
          <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
            <i class="fas fa-cogs text-white text-2xl"></i>
          </div>
          <h3 class="text-lg font-semibold mb-2">设备租赁</h3>
          <p class="text-sm text-gray-400">生产设备、检测设备、包装设备</p>
        </div>
        
        <div class="card" style="border-radius: 16px; padding: 24px; text-align: center;" onclick="showResourceType('space')">
          <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #2563eb); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
            <i class="fas fa-building text-white text-2xl"></i>
          </div>
          <h3 class="text-lg font-semibold mb-2">场地共享</h3>
          <p class="text-sm text-gray-400">生产场地、仓库、办公空间</p>
        </div>
        
        <div class="card" style="border-radius: 16px; padding: 24px; text-align: center;" onclick="showResourceType('technology')">
          <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
            <i class="fas fa-microchip text-white text-2xl"></i>
          </div>
          <h3 class="text-lg font-semibold mb-2">技术转让</h3>
          <p class="text-sm text-gray-400">生产工艺、配方技术、研发成果</p>
        </div>
      </div>

      <!-- 资源列表 -->
      <div id="equipment-resources" class="resource-section">
        <h2 class="text-2xl font-semibold mb-6">设备租赁</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="card" style="border-radius: 16px;">
            <div class="p-6">
              <div class="flex items-center gap-4 mb-4">
                <div style="width: 48px; height: 48px; background: rgba(245,158,11,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-industry text-amber-500"></i>
                </div>
                <h3 class="font-semibold">全自动编织机</h3>
              </div>
              <p class="text-sm text-gray-400 mb-4">型号：XZ-2000，产能：1000件/天，成色：九成新</p>
              <div class="flex justify-between items-center">
                <span class="text-primary font-semibold">¥2,000 / 月</span>
                <button class="btn btn-outline btn-sm">立即租赁</button>
              </div>
            </div>
          </div>
          
          <div class="card" style="border-radius: 16px;">
            <div class="p-6">
              <div class="flex items-center gap-4 mb-4">
                <div style="width: 48px; height: 48px; background: rgba(245,158,11,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-vial text-amber-500"></i>
                </div>
                <h3 class="font-semibold">质量检测设备</h3>
              </div>
              <p class="text-sm text-gray-400 mb-4">功能：拉力测试、成分分析，精度：0.01mm</p>
              <div class="flex justify-between items-center">
                <span class="text-primary font-semibold">¥1,500 / 月</span>
                <button class="btn btn-outline btn-sm">立即租赁</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="bg-gray-800 py-8">
    <div class="container mx-auto px-4 text-center text-gray-400 text-sm">
      <p>© 2024 鄄城县发制品产业大脑 版权所有</p>
      <div class="flex justify-center gap-4 mt-4">
        <a href="#" class="hover:text-white transition-colors">关于我们</a>
        <a href="#" class="hover:text-white transition-colors">联系我们</a>
        <a href="#" class="hover:text-white transition-colors">隐私政策</a>
        <a href="#" class="hover:text-white transition-colors">使用条款</a>
      </div>
    </div>
  </footer>

  <script>
    // 导航栏滚动效果
    window.addEventListener('scroll', function() {
      const nav = document.getElementById('main-nav');
      if (window.scrollY > 10) {
        nav.classList.add('nav-scrolled');
      } else {
        nav.classList.remove('nav-scrolled');
      }
    });
    
    // 资源类型切换
    function showResourceType(type) {
      document.querySelectorAll('.resource-section').forEach(section => {
        section.style.display = 'none';
      });
      document.getElementById(type + '-resources').style.display = 'block';
    }
  </script>
</body>
</html>
