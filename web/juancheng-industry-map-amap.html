<body>

                business: "技能培训、人才招聘",

            }
        ];
        
        // 初始化地图
        function initMap() {
            console.log('开始初始化地图');
            
            // 检查高德地图API是否加载成功
            if (typeof AMap === 'undefined') {
                console.error('高德地图API加载失败');
                // 显示错误信息
                document.getElementById('map').innerHTML = '<div style="padding: 20px; text-align: center; color: red;">高德地图API加载失败，请检查网络连接</div>';
                return;
            }
            
            console.log('高德地图API加载成功');
            
            try {
                // 创建地图实例
                const map = new AMap.Map("map", {
                    center: [115.75, 35.55],
                    zoom: 12,
                    resizeEnable: true
                });
                console.log('地图实例创建成功');
                
                // 添加控件
                map.addControl(new AMap.Scale({
                    position: 'LB'
                }));
                map.addControl(new AMap.ToolBar({
                    position: 'RB'
                }));
                map.addControl(new AMap.MapType({
                    position: 'RB'
                }));
                console.log('地图控件添加成功');
                
                // 存储所有标记
                const markers = [];
                
                // 添加企业标记
                console.log('开始添加企业标记，共' + enterprises.length + '家企业');
                enterprises.forEach((enterprise, index) => {
                    try {
                        const position = [enterprise.location[0], enterprise.location[1]];
                        
                        // 根据企业类型设置标记颜色
                        let iconColor;
                        switch (enterprise.type) {
                            case "upstream":
                                iconColor = "#34c759"; // 绿色
                                break;
                            case "midstream":
                                iconColor = "#007aff"; // 蓝色
                                break;
                            case "downstream":
                                iconColor = "#ff9500"; // 橙色
                                break;
                            case "supporting":
                                iconColor = "#af52de"; // 紫色
                                break;
                            default:
                                iconColor = "#ff3b30"; // 红色
                        }
                        
                        // 创建自定义图标
                        const icon = new AMap.Icon({
                            size: new AMap.Size(25, 34),
                            image: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png",
                            imageSize: new AMap.Size(135, 40),
                            imageOffset: new AMap.Pixel(-(4 - 1) * 40, -10)
                        });
                        
                        // 创建标记
                        const marker = new AMap.Marker({
                            position: position,
                            icon: icon,
                            title: enterprise.name
                        });
                        marker.enterpriseData = enterprise;
                        markers.push(marker);
                        
                        // 添加点击事件
                        marker.on('click', function() {
                            const data = this.enterpriseData;
                            const infoWindow = new AMap.InfoWindow({
                                content: `
                                    <div style="font-size: 14px; line-height: 1.5;">
                                        <h3 style="margin-bottom: 10px; color: #333;">${data.name}</h3>
                                        <p><strong>企业类型：</strong>${data.category}</p>
                                        <p><strong>主营范围：</strong>${data.business}</p>
                                        <p><strong>地址：</strong>${data.address}</p>
                                        <p><strong>年产值：</strong>${data.output}</p>
                                    </div>
                                `,
                                offset: new AMap.Pixel(0, -30)
                            });
                            infoWindow.open(map, position);
                        });
                        
                        // 添加到地图
                        marker.setMap(map);
                        console.log('企业标记' + (index + 1) + '添加成功: ' + enterprise.name);
                    } catch (error) {
                        console.error('添加企业标记失败: ' + enterprise.name, error);
                    }
                });
                
                // 筛选功能
                const filterUpstream = document.getElementById("filter-upstream");
                const filterMidstream = document.getElementById("filter-midstream");
                const filterDownstream = document.getElementById("filter-downstream");
                const filterSupporting = document.getElementById("filter-supporting");
                
                function updateMarkers() {
                    markers.forEach(marker => {
                        const type = marker.enterpriseData.type;
                        let show = false;
                        
                        switch (type) {
                            case "upstream":
                                show = filterUpstream.checked;
                                break;
                            case "midstream":
                                show = filterMidstream.checked;
                                break;
                            case "downstream":
                                show = filterDownstream.checked;
                                break;
                            case "supporting":
                                show = filterSupporting.checked;
                                break;
                        }
                        
                        if (show) {
                            marker.setMap(map);
                        } else {
                            marker.setMap(null);
                        }
                    });
                }
                
                // 绑定筛选事件
                filterUpstream.addEventListener("change", updateMarkers);
                filterMidstream.addEventListener("change", updateMarkers);
                filterDownstream.addEventListener("change", updateMarkers);
                filterSupporting.addEventListener("change", updateMarkers);
                
                console.log('地图初始化完成');
            } catch (error) {
                console.error('地图初始化过程中发生错误:', error);
                document.getElementById('map').innerHTML = '<div style="padding: 20px; text-align: center; color: red;">地图初始化失败: ' + error.message + '</div>';
            }
        }
        
        // 页面加载完成后初始化地图
        window.onload = initMap;
