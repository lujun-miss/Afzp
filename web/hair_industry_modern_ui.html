<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-bg: #0a0e27;
            --secondary-bg: #1a1f3a;
            --accent-color: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --card-bg: rgba(15, 20, 41, 0.8);
            --card-border: rgba(0, 242, 254, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 50%, #0f1429 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .header h1 {
            font-size: 3em;
            background: linear-gradient(45deg, var(--accent-color), #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 10px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 1.2em;
        }
        
        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            transition: var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-tab {
            padding: 10px 20px;
            background: rgba(10, 14, 39, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        
        .filter-tab:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        
        .filter-tab.active {
            background: var(--accent-color);
            color: var(--primary-bg);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .category-tab {
            padding: 8px 16px;
            background: rgba(10, 14, 39, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 12px;
        }
        
        .category-tab:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-color);
        }
        
        .category-tab.active {
            background: var(--accent-color);
            color: var(--primary-bg);
            border-color: var(--accent-color);
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-color), #667eea);
            transform: scaleX(0);
            transition: var(--transition);
        }
        
        .card:hover::before {
            transform: scaleX(1);
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.1);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0, 242, 254, 0.1);
            border: 2px solid var(--accent-color);
        }
        
        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .card-category {
            font-size: 0.8em;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card-content {
            margin-bottom: 20px;
        }
        
        .card-description {
            font-size: 0.9em;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .tag {
            padding: 4px 12px;
            background: rgba(10, 14, 39, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            font-size: 0.75em;
            color: var(--text-secondary);
            transition: var(--transition);
        }
        
        .tag:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8em;
            color: var(--text-secondary);
        }
        
        .card-stats {
            display: flex;
            gap: 15px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat-icon {
            font-size: 12px;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .empty-description {
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(0, 242, 254, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 242, 254, 0);
            }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .control-panel {
                padding: 20px;
            }
            
            .filter-tabs {
                justify-content: center;
            }
        }
    </style>
</head>

            renderCards();

        }
        
        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('gridContainer');
            
            // 应用筛选
            let data = [...industryData];
            
            // 搜索筛选
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                data = data.filter(item => 
                    item.name.toLowerCase().includes(query) ||
                    item.description.toLowerCase().includes(query) ||
                    item.tags.some(tag => tag.toLowerCase().includes(query))
                );
            }
            
            // 层级筛选
            if (activeFilter !== 'all') {
                data = data.filter(item => item.level === activeFilter);
            }
            
            // 类别筛选
            if (activeCategory) {
                data = data.filter(item => item.category === activeCategory);
            }
            
            filteredData = data;
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">未找到匹配项</div>
                        <div class="empty-description">
                            ${searchQuery ? '没有找到包含"' + searchQuery + '"的要素' : '请尝试调整筛选条件'}
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = data.map(item => `
                <div class="card" data-id="${item.id}">
                    <div class="card-header">
                        <div class="card-icon">${item.icon}</div>
                        <div>
                            <div class="card-title">${item.name}</div>
                            <div class="card-category">${getCategoryName(item.category)}</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-description">${item.description}</div>
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-stats">
                            <div class="stat">
                                <span class="stat-icon">⭐</span>
                                <span>${item.importance}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-icon">📈</span>
                                <span>${item.growth}</span>
                            </div>
                        </div>
                        <div class="stat">
                            <span class="stat-icon">📍</span>
                            <span>${getLevelName(item.level)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 获取类别名称
        function getCategoryName(category) {
            const names = {
                'raw': '原材料',
                'accessories': '核心辅料',
                'materials': '处理材料',
                'packaging': '包装工具',
                'semi': '半成品',
                'process': '工艺流程',
                'equipment': '生产设备',
                'fashion': '时尚消费',
                'medical': '医疗康复',
                'entertainment': '演艺特效',
                'protection': '职业防护',
                'education': '发教礼品'
            };
            return names[category] || category;
        }
        
        // 获取层级名称
        function getLevelName(level) {
            const names = {
                'upstream': '上游',
                'midstream': '中游',
                'downstream': '下游'
            };
            return names[level] || level;
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 搜索功能
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderCards();
            });
            
            // 筛选标签
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    activeFilter = tab.dataset.filter;
                    renderCards();
                });
            });
            
            // 类别标签
            const categoryTabs = document.querySelectorAll('.category-tab');
            categoryTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const category = tab.dataset.category;
                    if (tab.classList.contains('active')) {
                        tab.classList.remove('active');
                        activeCategory = null;
                    } else {
                        categoryTabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        activeCategory = category;
                    }
                    renderCards();
                });
            });
            
            // 卡片点击事件（可以扩展为显示详情）
            document.addEventListener('click', (e) => {
                if (e.target.closest('.card')) {
                    const card = e.target.closest('.card');
                    card.classList.toggle('pulse');
                    setTimeout(() => card.classList.remove('pulse'), 2000);
                }
            });
        }
        
        // 启动应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
