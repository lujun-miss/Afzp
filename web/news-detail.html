            <li>请认真填写参展申请表，确保信息准确</li>
            <li>遵守展会相关规定，共同维护展会秩序</li>
            <li>如有任何疑问，请及时联系组委会</li>
          </ul>
          
          <p>欢迎全球发制品企业积极报名参展，共同打造国际化的发制品行业盛会！</p>
        `,
        relatedNews: [
          { id: 'news001', title: '2026中国发制品博览会参展指南发布', date: '2026-03-28' },
          { id: 'news002', title: '2025年展会总结报告：发制品行业迎来新机遇', date: '2026-03-25' }
        ]
      }
    };
    
    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    // 加载新闻内容
    function loadNewsContent() {
      const newsId = getUrlParam('id');
      const container = document.getElementById('news-content-container');
      
      if (!newsId || !newsData[newsId]) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <i class="fas fa-exclamation-triangle text-4xl text-warning"></i>
            <p style="margin-top: 16px; color: var(--text-secondary);">新闻内容不存在</p>
            <button class="btn btn-primary" onclick="window.location.href='exhibition-news.html'" style="margin-top: 24px;">
              返回资讯列表
            </button>
          </div>
        `;
        return;
      }
      
      const news = newsData[newsId];
      
      container.innerHTML = `
        <!-- 左右分栏布局 -->
        <div style="display: flex; gap: 32px;">
          <!-- 新闻内容 -->
          <div style="flex: 2;">
            <div class="news-content">
              <!-- 新闻标题 -->
              <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 12px; text-align: center;">${news.title}</h1>
              <p style="font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 32px;">发布时间：${news.date} | 地点：${news.location} | 主办：${news.organizer}</p>
              ${news.content}
            </div>
          </div>
          
          <!-- 相关资讯 -->
          <div style="flex: 1.2;">
            <div class="news-related">
              <h3>相关资讯</h3>
              <div>
                ${news.relatedNews.map(item => `
                  <div class="related-item" onclick="window.location.href='news-detail.html?id=${item.id}'">
                    <div class="related-title">${item.title}</div>
                    <div class="related-meta">${item.date}</div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }
    

    
    // 页面加载完成后加载新闻内容
    window.addEventListener('DOMContentLoaded', loadNewsContent);
  </script>
</body>
</html>
