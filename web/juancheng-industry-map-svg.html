            border-radius: 50%;
            cursor: pointer;

        .marker:hover {
            transform: scale(1.5);
        }
        
        .marker::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;

        }
        
        .flow-line {
            position: absolute;
            opacity: 0.6;
            transform-origin: left center;
            z-index: 10;
        }
        
        .flow-line::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 6px 0 6px 8px;
            border-style: solid;
        }

            background-color: #34c759;

        }

            background-color: #007aff;
        }

            border-color: transparent transparent transparent #007aff;
        }

            background: linear-gradient(90deg, transparent, currentColor, transparent);
            background-size: 200% 100%;
            animation: flow 2s infinite;
        }

        // 初始化地图
        function initMap() {
            console.log('开始初始化地图');
            
            const mapContent = document.querySelector('.map-content');// 存储所有标记
            const markers = [];
            // 存储流动线
            const flowLines = [];
            let currentInfoWindow = null;
            
            // 添加企业标记
            console.log('开始添加企业标记，共' + enterprises.length + '家企业');
            enterprises.forEach((enterprise, index) => {
                try {
                    const marker = document.createElement('div');
                    marker.className = 'marker';
                    
                    // 根据企业类型设置标记颜色
                    let markerColor;
                    switch (enterprise.type) {
                        case "upstream":
                            markerColor = "#34c759"; // 绿色
                            break;
                        case "midstream":
                            markerColor = "#007aff"; // 蓝色
                            break;
                        case "downstream":
                            markerColor = "#ff9500"; // 橙色
                            break;
                        case "supporting":
                            markerColor = "#af52de"; // 紫色
                            break;
                        default:
                            markerColor = "#ff3b30"; // 红色
                    }
                    
                    marker.style.backgroundColor = markerColor;
                    marker.style.borderColor = markerColor;
                    marker.style.left = enterprise.location[0] + '%';
                    marker.style.top = enterprise.location[1] + '%';
                    marker.style.transform = 'translate(-50%, -50%)';
                    
                    // 存储企业数据
                    marker.enterpriseData = enterprise;
                    markers.push(marker);
                    
                    // 添加点击事件
                    marker.addEventListener('click', function(e) {
                        e.stopPropagation();
                        
                        // 移除之前的信息窗口
                        if (currentInfoWindow) {
                            mapContent.removeChild(currentInfoWindow);
                        }
                        
                        // 创建信息窗口

                            <p><strong>地址：</strong>${enterprise.address}</p>
                            <p><strong>年产值：</strong>${enterprise.output}</p>
                        `;
                        
                        // 定位信息窗口
                        infoWindow.style.left = (enterprise.location[0] + 2) + '%';
                        infoWindow.style.top = (enterprise.location[1] - 10) + '%';
                        
                        // 添加到地图
                        mapContent.appendChild(infoWindow);
                        currentInfoWindow = infoWindow;
                    });
                    
                    // 添加到地图
                    mapContent.appendChild(marker);
                    console.log('企业标记' + (index + 1) + '添加成功: ' + enterprise.name);
                } catch (error) {
                    console.error('添加企业标记失败: ' + enterprise.name, error);
                }
            });
            
            // 点击地图空白处关闭信息窗口
            mapContent.addEventListener('click', function() {
                if (currentInfoWindow) {
                    mapContent.removeChild(currentInfoWindow);
                    currentInfoWindow = null;
                }
            });
            
            // 添加上下游流动线
            function addFlowLines() {
                const upstreamMarkers = markers.filter(marker => marker.enterpriseData.type === 'upstream');
                const midstreamMarkers = markers.filter(marker => marker.enterpriseData.type === 'midstream');
                const downstreamMarkers = markers.filter(marker => marker.enterpriseData.type === 'downstream');
                
                // 上游到中游的流动线
                upstreamMarkers.forEach((upstreamMarker) => {
                    // 为每个上游企业连接到最近的中游企业
                    let closestMidstream = null;
                    let minDistance = Infinity;
                    
                    midstreamMarkers.forEach(midstreamMarker => {
                        const upstreamX = parseFloat(upstreamMarker.style.left);
                        const upstreamY = parseFloat(upstreamMarker.style.top);
                        const midstreamX = parseFloat(midstreamMarker.style.left);
                        const midstreamY = parseFloat(midstreamMarker.style.top);
                        
                        const distance = Math.sqrt(Math.pow(midstreamX - upstreamX, 2) + Math.pow(midstreamY - upstreamY, 2));
                        if (distance < minDistance) {
                            minDistance = distance;
                            closestMidstream = midstreamMarker;
                        }
                    });
                    
                    if (closestMidstream) {
                        const upstreamX = parseFloat(upstreamMarker.style.left);
                        const upstreamY = parseFloat(upstreamMarker.style.top);
                        const midstreamX = parseFloat(closestMidstream.style.left);
                        const midstreamY = parseFloat(closestMidstream.style.top);
                        
                        // 计算线的长度和角度
                        const length = Math.sqrt(Math.pow(midstreamX - upstreamX, 2) + Math.pow(midstreamY - upstreamY, 2));
                        const angle = Math.atan2(midstreamY - upstreamY, midstreamX - upstreamX) * 180 / Math.PI;
                        
                        // 创建流动线
                        const flowLine = document.createElement('div');
                        flowLine.className = 'flow-line upstream-to-midstream animated';
                        flowLine.style.width = length + '%';
                        flowLine.style.height = '2px';
                        flowLine.style.left = upstreamX + '%';
                        flowLine.style.top = upstreamY + '%';
                        flowLine.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
                        
                        // 添加到地图
                        mapContent.appendChild(flowLine);
                        // 添加到流动线数组
                        flowLines.push(flowLine);
                    }
                });
                
                // 中游到下游的流动线
                midstreamMarkers.forEach((midstreamMarker) => {
                    // 为每个中游企业连接到最近的下游企业
                    let closestDownstream = null;
                    let minDistance = Infinity;
                    
                    downstreamMarkers.forEach(downstreamMarker => {
                        const midstreamX = parseFloat(midstreamMarker.style.left);
                        const midstreamY = parseFloat(midstreamMarker.style.top);
                        const downstreamX = parseFloat(downstreamMarker.style.left);
                        const downstreamY = parseFloat(downstreamMarker.style.top);
                        
                        const distance = Math.sqrt(Math.pow(downstreamX - midstreamX, 2) + Math.pow(downstreamY - midstreamY, 2));
                        if (distance < minDistance) {
                            minDistance = distance;
                            closestDownstream = downstreamMarker;
                        }
                    });
                    
                    if (closestDownstream) {
                        const midstreamX = parseFloat(midstreamMarker.style.left);
                        const midstreamY = parseFloat(midstreamMarker.style.top);
                        const downstreamX = parseFloat(closestDownstream.style.left);
                        const downstreamY = parseFloat(closestDownstream.style.top);
                        
                        // 计算线的长度和角度
                        const length = Math.sqrt(Math.pow(downstreamX - midstreamX, 2) + Math.pow(downstreamY - midstreamY, 2));
                        const angle = Math.atan2(downstreamY - midstreamY, downstreamX - midstreamX) * 180 / Math.PI;
                        
                        // 创建流动线
                        const flowLine = document.createElement('div');
                        flowLine.className = 'flow-line midstream-to-downstream animated';
                        flowLine.style.width = length + '%';
                        flowLine.style.height = '2px';
                        flowLine.style.left = midstreamX + '%';
                        flowLine.style.top = midstreamY + '%';
                        flowLine.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
                        
                        // 添加到地图
                        mapContent.appendChild(flowLine);
                        // 添加到流动线数组
                        flowLines.push(flowLine);
                    }
                });
            }
            
            // 添加流动线
            addFlowLines();
            
            // 筛选功能
            const filterUpstream = document.getElementById("filter-upstream");
            const filterMidstream = document.getElementById("filter-midstream");
            const filterDownstream = document.getElementById("filter-downstream");
            const filterSupporting = document.getElementById("filter-supporting");
            
            function updateMarkers() {
                markers.forEach(marker => {
                    const type = marker.enterpriseData.type;
                    let show = false;
                    
                    switch (type) {
                        case "upstream":
                            show = filterUpstream.checked;
                            break;
                        case "midstream":
                            show = filterMidstream.checked;
                            break;
                        case "downstream":
                            show = filterDownstream.checked;
                            break;
                        case "supporting":
                            show = filterSupporting.checked;
                            break;
                    }
                    
                    marker.style.display = show ? 'block' : 'none';
                });
                
                // 更新流动线显示
                updateFlowLines();
            }
            
            function updateFlowLines() {
                const showUpstream = filterUpstream.checked;
                const showMidstream = filterMidstream.checked;
                const showDownstream = filterDownstream.checked;
                
                flowLines.forEach(line => {
                    if (line.classList.contains('upstream-to-midstream')) {
                        // 上游到中游的流动线需要同时显示上游和中游企业
                        line.style.display = (showUpstream && showMidstream) ? 'block' : 'none';
                    } else if (line.classList.contains('midstream-to-downstream')) {
                        // 中游到下游的流动线需要同时显示中游和下游企业
                        line.style.display = (showMidstream && showDownstream) ? 'block' : 'none';
                    }
                });
            }
            
            // 绑定筛选事件
            filterUpstream.addEventListener("change", updateMarkers);
            filterMidstream.addEventListener("change", updateMarkers);
            filterDownstream.addEventListener("change", updateMarkers);
            filterSupporting.addEventListener("change", updateMarkers);
            
            console.log('地图初始化完成');
        }
        
        // 页面加载完成后初始化地图
        window.onload = initMap;
    </script>
</body>
</html>
